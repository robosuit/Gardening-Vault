# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        id: install
        continue-on-error: true
        run: |
          node --version
          npm --version
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Build data
        if: steps.install.outcome == 'success'
        run: npm run build-data
      - name: Build status
        if: steps.install.outcome != 'success'
        run: echo "Dependency install failed; deploying committed ./web content to keep Pages online."
      - name: Ensure Pages uses workflow deploy
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          API_URL="https://api.github.com/repos/${{ github.repository }}/pages"

          UPDATE_CODE=$(curl -sS -o /tmp/pages_update.json -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_URL}" \
            -d '{"build_type":"workflow"}')

          echo "Pages update response code: ${UPDATE_CODE}"
          cat /tmp/pages_update.json

          if [ "${UPDATE_CODE}" = "404" ]; then
            CREATE_CODE=$(curl -sS -o /tmp/pages_create.json -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_URL}" \
              -d '{"build_type":"workflow","source":{"branch":"main","path":"/"}}')
            echo "Pages create response code: ${CREATE_CODE}"
            cat /tmp/pages_create.json
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only the web directory
          path: './web'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
